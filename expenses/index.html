<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Expenses · Sakra Sales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
<div class="device" id="device">
  <div class="stage">

    <!-- LIST -->
    <div class="screen-view" id="view-list">
      <div class="appheader">
        <div class="header-row">
          <h1 class="page-title">Expenses</h1>
          <div class="avatar" onclick="location.href='/profile'">RH</div>
        </div>
      </div>
      <!-- summary -->
      <div class="dash-stats" style="margin:0 18px 4px;">
        <div class="dash-stat"><span class="dash-stat-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>
          <span class="dash-stat-body"><span class="dash-stat-v" id="ex-spent">₹0</span><span class="dash-stat-l">Spent · this month</span></span></div>
        <div class="dash-stat"><span class="dash-stat-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
          <span class="dash-stat-body"><span class="dash-stat-v" id="ex-pending">₹0</span><span class="dash-stat-l">Reimbursement due</span></span></div>
      </div>
      <div class="chiprow" id="exp-chips"></div>
      <div class="toolsrow">
        <span class="count" id="exp-count">— expenses</span>
        <div class="tools"><button class="plan-reopt-btn" onclick="openSheet('newexp')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>New expense</button></div>
      </div>
      <div class="screen"><div class="pad" id="exp-list" style="padding-top:0;"></div></div>
    </div>

    <!-- DETAIL -->
    <div class="screen-view" id="view-detail">
      <div class="vd-topbar">
        <a class="vd-back" href="/expenses" onclick="event.preventDefault();bucketGo('/expenses');">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </a>
        <div class="vd-topbar-title"><div class="vd-visit-id" id="ed-id">Expense</div><div class="vd-follow-up" id="ed-status"></div></div>
        <span style="width:36px;"></span>
      </div>
      <div class="screen"><div style="padding:14px 18px 110px;" id="ed-content"></div></div>
      <div class="vd-footer" id="ed-footer"></div>
    </div>

  </div>

  <!-- New expense sheet -->
  <div class="sheet-backdrop" id="newexp-backdrop" onclick="closeSheet('newexp')"></div>
  <div class="bottom-sheet" id="newexp-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">New expense</span>
      <button class="sheet-close" onclick="closeSheet('newexp')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
    <div class="co-section"><label class="tke-label">Category <span class="req" style="color:var(--red)">*</span></label><select class="tke-select" id="ne-cat"></select></div>
    <div class="co-section"><label class="tke-label">Amount (₹) <span class="req" style="color:var(--red)">*</span></label><input type="number" class="tke-input" id="ne-amount" placeholder="e.g. 620" style="font-size:16px;"></div>
    <div class="co-section"><label class="tke-label">Date</label><input type="date" class="tke-input" id="ne-date" value="2026-06-16" style="font-size:16px;"></div>
    <div class="co-section"><label class="tke-label">Payment mode</label><select class="tke-select" id="ne-mode"></select></div>
    <div class="co-section"><label class="tke-label">Link to (optional)</label><select class="tke-select" id="ne-link"></select></div>
    <div class="co-section"><label class="tke-label">Note</label><textarea class="tke-textarea" id="ne-note" placeholder="What was this for?"></textarea></div>
    <div class="co-section">
      <label class="tke-label">Receipt</label>
      <input class="attach-input" id="ne-receipt-input" type="file" accept=".pdf,.jpg,.jpeg,.png,application/pdf,image/*" onchange="onReceiptPick(event)" style="display:none;">
      <button class="attach-btn" type="button" onclick="document.getElementById('ne-receipt-input').click()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        Attach receipt
      </button>
      <div class="attach-help" id="ne-receipt-name">Photo or PDF · optional</div>
    </div>
    <div class="sheet-footer">
      <button class="btn secondary" onclick="saveExpense('Draft')">Save draft</button>
      <button class="btn btn-primary" onclick="saveExpense('Submitted')">Submit for approval</button>
    </div>
  </div>
</div>

<script src="/assets/data.js"></script>
<script src="/assets/shell.js"></script>
<script>
initShell('more');

const xs={filter:"All",receiptName:""};
const EXP_TABS=["All","Draft","Submitted","Approved","Paid"];

function renderChips(){
  document.getElementById('exp-chips').innerHTML=EXP_TABS.map(t=>`<button class="chip ${xs.filter===t?'active':''}" onclick="setExpFilter('${t}')">${t}</button>`).join('');
}
function setExpFilter(t){xs.filter=t;renderChips();renderExpenses();}

function renderSummary(){
  const all=getExpenses();
  const spent=all.filter(e=>e.status!=='Draft'&&e.status!=='Rejected').reduce((s,e)=>s+e.amount,0);
  const due=all.filter(e=>e.status==='Submitted'||e.status==='Approved').reduce((s,e)=>s+e.amount,0);
  document.getElementById('ex-spent').textContent=fmtRs(spent);
  document.getElementById('ex-pending').textContent=fmtRs(due);
}

function renderExpenses(){
  renderSummary();
  let rows=getExpenses().filter(e=>xs.filter==='All'||e.status===xs.filter);
  rows=[...rows].sort((a,b)=>a.created-b.created);
  document.getElementById('exp-count').textContent=`${rows.length} expense${rows.length!==1?'s':''}`;
  const list=document.getElementById('exp-list');
  if(!rows.length){ list.innerHTML='<div class="empty"><div class="et">No expenses</div><div class="ed">Add a new expense or change the filter.</div></div>'; return; }
  list.innerHTML=rows.map(e=>{
    const c=expCatMeta(e.category);
    return `<div class="card" onclick="bucketGo('/expenses/${e.id}')">
      <div class="card-top">
        <span class="card-title">${c.l}</span>
        <span class="card-title" style="font-size:var(--f-sub);color:var(--ink);">${fmtRs(e.amount)}</span>
      </div>
      <div class="inner"><div class="line sub">${e.note||'—'}</div>${e.linkLabel?`<div class="line sub">↳ ${e.linkLabel}</div>`:''}</div>
      <div class="card-foot">
        <span class="foot-meta">${e.date} · ${e.paymentMode}${e.receipt?' · 📎':''}</span>
        <span class="pill ${EXPENSE_STATUS_CLASS[e.status]}">${e.status}</span>
      </div>
    </div>`;
  }).join('');
}

/* ── New expense ── */
const _openX=openSheet;
openSheet=function(id){ if(id==='newexp') populateNewExp(); _openX(id); };
function populateNewExp(){
  document.getElementById('ne-cat').innerHTML=EXPENSE_CATEGORIES.map(c=>`<option value="${c.k}">${c.l}</option>`).join('');
  document.getElementById('ne-mode').innerHTML=PAYMENT_MODES.map(m=>`<option>${m}</option>`).join('');
  const accOpts=ACCOUNTS.map(a=>`<option value="acc:${slugify(a.name)}">Account · ${a.name}</option>`).join('');
  const actOpts=(typeof ACTIVITIES!=='undefined'?ACTIVITIES:[]).map(a=>`<option value="act:${a.id}">Activity · ${a.name} (${a.venueName})</option>`).join('');
  document.getElementById('ne-link').innerHTML=`<option value="">None</option>${accOpts}${actOpts}`;
  document.getElementById('ne-amount').value=''; document.getElementById('ne-note').value='';
  xs.receiptName=''; document.getElementById('ne-receipt-name').textContent='Photo or PDF · optional';
}
function onReceiptPick(e){
  const f=(e.target.files||[])[0];
  xs.receiptName=f?f.name:'';
  document.getElementById('ne-receipt-name').textContent=f?`📎 ${f.name}`:'Photo or PDF · optional';
}
function saveExpense(status){
  const amount=parseInt(document.getElementById('ne-amount').value||'0',10);
  if(!amount){ snack('Please enter an amount.'); return; }
  const cat=document.getElementById('ne-cat').value;
  const link=document.getElementById('ne-link').value;
  let linkType='none',linkLabel='',accountSlug='';
  if(link.startsWith('acc:')){ accountSlug=link.slice(4); const a=ACCOUNTS.find(x=>slugify(x.name)===accountSlug); linkType='account'; linkLabel=a?a.name:''; }
  else if(link.startsWith('act:')){ const a=ACTIVITIES.find(x=>x.id===link.slice(4)); linkType='activity'; linkLabel=a?`${a.name} (${a.venueName})`:''; accountSlug=a?a.venueSlug:''; }
  const dISO=document.getElementById('ne-date').value;
  const d=dISO?new Date(dISO):new Date(2026,5,16);
  const date=`${d.getDate()} ${MONTHS[d.getMonth()]} '${String(d.getFullYear()).slice(2)}`;
  addExpense({id:'EX-'+(1000+newExpenses().length),date,category:cat,amount,paymentMode:document.getElementById('ne-mode').value,
    note:(document.getElementById('ne-note').value||'').trim(),status,linkType,linkLabel,accountSlug,
    receipt:xs.receiptName,submittedBy:"Raj Hussain",created:900+newExpenses().length});
  closeSheet('newexp');
  xs.filter=status; renderChips(); renderExpenses();
  snack(status==='Draft'?'Saved as draft.':'Expense submitted for approval.');
}

/* ── Detail ── */
function vRow(label,val){return `<div class="vd-row"><span class="vd-row-label">${label}</span><span class="vd-row-value">${val||'—'}</span></div>`;}
function approvalTrail(e){
  const steps=[{l:"Submitted",by:e.submittedBy,on:e.status!=='Draft'},
    {l:e.status==='Rejected'?"Rejected by manager":"Approved by manager",by:"Priya Sundaram",on:e.status==='Approved'||e.status==='Paid'||e.status==='Rejected'},
    {l:"Reimbursed",by:"Finance",on:e.status==='Paid'}];
  return `<div class="acc open" style="margin-top:14px;"><div class="acc-head">
    <div class="acc-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
    <div class="acc-title"><div class="acc-name">Approval trail</div><div class="acc-sub">Maker-checker</div></div></div>
    <div class="acc-body"><div class="tl-list">
    ${steps.map(s=>`<div class="tl-item"><div class="tl-left"><div class="tl-dot ${s.on?'pos':''}"></div><div class="tl-line"></div></div>
      <div class="tl-body"><div class="tl-row"><div class="tl-title" style="${s.on?'':'color:var(--ink-3);'}">${s.l}</div></div><div class="tl-by">${s.on?s.by:'Pending'}</div></div></div>`).join('')}
    </div></div></div>`;
}
function renderDetail(id){
  const e=findExpenseById(id);
  const content=document.getElementById('ed-content'), footer=document.getElementById('ed-footer');
  if(!e){ document.getElementById('ed-id').textContent='Expense not found'; document.getElementById('ed-status').textContent=''; content.innerHTML='<div class="empty" style="margin-top:24px;"><div class="et">Expense not found</div></div>'; footer.innerHTML=''; return; }
  const c=expCatMeta(e.category);
  document.getElementById('ed-id').textContent=`${c.l} · ${fmtRs(e.amount)}`;
  document.getElementById('ed-status').textContent=e.status;
  content.innerHTML=`
    <div class="card" style="margin-bottom:14px;">
      <div class="card-top"><span class="card-title" style="font-size:var(--f-h1);">${fmtRs(e.amount)}</span><span class="pill ${EXPENSE_STATUS_CLASS[e.status]}">${e.status}</span></div>
      <div class="inner"><div class="line">${c.l}</div><div class="line sub">${e.note||'—'}</div></div>
    </div>
    <div class="acc open"><div class="acc-head"><div class="acc-icon">${c.ic}</div>
      <div class="acc-title"><div class="acc-name">Expense details</div><div class="acc-sub">Category &amp; linkage</div></div></div>
      <div class="acc-body">
        ${vRow('Date',e.date)}
        ${vRow('Category',c.l)}
        ${vRow('Amount',fmtRs(e.amount))}
        ${vRow('Payment mode',e.paymentMode)}
        ${vRow('Linked to',e.linkLabel||'—')}
        ${vRow('Receipt',e.receipt?('📎 '+e.receipt):'No receipt')}
        ${vRow('Submitted by',e.submittedBy)}
      </div></div>
    ${approvalTrail(e)}
    ${e.accountSlug?`<div class="card" style="margin-top:14px;" onclick="location.href='/accounts/${e.accountSlug}'"><div class="card-top"><span class="card-title" style="font-size:var(--f-sub);">${e.linkLabel}</span><span class="pill up">Account</span></div><div class="inner"><div class="line sub">View account ›</div></div></div>`:''}`;
  /* footer by status + role */
  const mgr=(typeof currentRole==='function'?currentRole():'rep')==='manager';
  if(e.status==='Draft'){ footer.innerHTML=`<button class="btn btn-primary" style="flex:1;padding:14px;font-size:var(--f-sub);" onclick="submitExpense('${e.id}')">Submit for approval</button>`; }
  else if(e.status==='Submitted'){ footer.innerHTML=mgr?`<button class="btn secondary" style="flex:0 0 auto;padding:14px 16px;" onclick="decideExpense('${e.id}','Rejected')">Reject</button><button class="btn btn-primary" style="flex:1;padding:14px;font-size:var(--f-sub);" onclick="decideExpense('${e.id}','Approved')">Approve</button>`:`<button class="btn secondary" style="flex:1;padding:14px;font-size:var(--f-sub);opacity:.7;" disabled>Awaiting manager approval</button>`; }
  else if(e.status==='Approved'){ footer.innerHTML=`<button class="btn btn-primary" style="flex:1;padding:14px;font-size:var(--f-sub);" onclick="decideExpense('${e.id}','Paid')">Mark reimbursed</button>`; }
  else { footer.innerHTML=`<button class="btn secondary" style="flex:1;padding:14px;font-size:var(--f-sub);" onclick="bucketGo('/expenses')">Back to expenses</button>`; }
  document.querySelector('#view-detail .screen').scrollTop=0;
}
function submitExpense(id){ setExpenseStatus(id,'Submitted'); renderDetail(id); snack('Submitted for approval.'); }
function decideExpense(id,status){ setExpenseStatus(id,status); renderDetail(id); snack(status==='Approved'?'Expense approved.':status==='Rejected'?'Expense rejected.':'Marked reimbursed.'); }

function showView(name){
  document.getElementById('view-list').classList.toggle('active',name==='list');
  document.getElementById('view-detail').classList.toggle('active',name==='detail');
}
bucketRoute('/expenses',{
  list(){ showView('list'); renderChips(); renderExpenses(); },
  detail(id){ showView('detail'); renderDetail(id); },
});
</script>
</body>
</html>
