<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Beat Plan · Sakra Sales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
<div class="device" id="device">
  <div class="stage">

    <!-- LIST view -->
    <div class="screen-view" id="view-list">
      <div class="appheader">
        <div class="header-row">
          <h1 class="page-title">Beat plan</h1>
          <div class="avatar" onclick="location.href='/profile'">RH</div>
        </div>
      </div>

      <!-- Maker-checker banner -->
      <div class="pad" id="mc-banner" style="padding-top:0;padding-bottom:0;"></div>

      <!-- Plan / History toggle -->
      <div class="plan-toolbar">
        <div class="view-toggle" role="tablist">
          <button id="vt-plan" class="view-toggle-btn sel" onclick="setMainView('plan')">Today's plan</button>
          <button id="vt-hist" class="view-toggle-btn" onclick="setMainView('hist')">Visit history</button>
        </div>
        <button class="plan-reopt-btn" onclick="openSheet('newplan')" title="Create a new beat plan">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
          New plan
        </button>
      </div>

      <div class="plan-statusbar" id="plan-statusbar"></div>
      <div class="toolsrow">
        <span class="count" id="plan-count">— visits</span>
      </div>
      <div class="screen">
        <div class="pad" id="plan-list" style="padding-top:2px;"></div>
        <div class="pad" id="hist-list" style="padding-top:2px;display:none;"></div>
      </div>
    </div>

    <!-- DETAIL view -->
    <div class="screen-view" id="view-detail">
      <div class="vd-topbar">
        <a class="vd-back" href="/beat-plan" onclick="event.preventDefault();bucketGo('/beat-plan');">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </a>
        <div class="vd-topbar-title">
          <div class="vd-visit-id" id="vd-visit-id">Visit</div>
          <div class="vd-follow-up" id="vd-follow-up"></div>
        </div>
        <button class="vd-edit-btn" onclick="openSheet('update')" aria-label="Reschedule visit">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
      </div>
      <div class="screen"><div style="padding:0 0 100px;">
        <div class="vd-hero-wrap">
          <div class="vd-hero">
            <div class="vd-hero-avatar" id="vd-hero-avatar">AC</div>
            <div class="vd-hero-body">
              <div class="vd-hero-top">
                <div style="min-width:0;flex:1;">
                  <div class="vd-hero-name" id="vd-hero-name">Account</div>
                  <div class="vd-hero-spec" id="vd-hero-purpose">Purpose</div>
                </div>
                <span class="pill up" id="vd-hero-type" style="margin-top:2px;">Type</span>
              </div>
              <div class="vd-hero-clinic">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-7-8-13a8 8 0 0 1 16 0c0 6-8 13-8 13z"/><circle cx="12" cy="9" r="3"/></svg>
                <span class="ct" id="vd-hero-account"></span>
              </div>
              <div class="vd-hero-actions">
                <a class="vd-hero-action" href="#" onclick="event.preventDefault();openAccount()">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 8h2M13 8h2M9 12h2M13 12h2M9 16h6"/></svg>
                  Account
                </a>
                <button class="vd-hero-action" onclick="snack('Message — open from Contacts.')">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                  Message
                </button>
              </div>
            </div>
          </div>
        </div>
        <div style="padding:0 18px 32px;" id="vd-content"></div>
      </div></div>
      <div class="vd-footer" id="vd-footer">
        <button class="btn btn-primary" id="vd-footer-cta" style="flex:1;padding:14px;font-size:var(--f-sub);"></button>
      </div>
    </div>

  </div>

  <!-- New plan sheet (maker) -->
  <div class="sheet-backdrop" id="newplan-backdrop" onclick="closeSheet('newplan')"></div>
  <div class="bottom-sheet" id="newplan-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div>
        <span class="sheet-title">Create a beat plan</span>
        <div class="msg-doctor-line">Submitted to your manager for approval</div>
      </div>
      <button class="sheet-close" onclick="closeSheet('newplan')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="co-mode-grid">
      <button class="co-mode-card ai" onclick="createPlan('auto')">
        <span class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4L12 2z"/></svg></span>
        <div class="co-mode-card-body">
          <div class="co-mode-card-t">Auto-generate <span class="co-mode-card-tag">AI</span></div>
          <div class="co-mode-card-s">System builds the optimal plan by priority &amp; route.</div>
        </div>
        <svg class="co-mode-card-go" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 6l6 6-6 6"/></svg>
      </button>
      <button class="co-mode-card" onclick="createPlan('manual')">
        <span class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span>
        <div class="co-mode-card-body">
          <div class="co-mode-card-t">Build it myself</div>
          <div class="co-mode-card-s">Pick accounts &amp; times yourself, then send for approval.</div>
        </div>
        <svg class="co-mode-card-go" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </div>
  </div>

  <!-- Approval detail sheet (checker) -->
  <div class="sheet-backdrop" id="approval-backdrop" onclick="closeSheet('approval')"></div>
  <div class="bottom-sheet" id="approval-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div>
        <span class="sheet-title">Plan awaiting approval</span>
        <div class="msg-doctor-line" id="approval-sub">—</div>
      </div>
      <button class="sheet-close" onclick="closeSheet('approval')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div id="approval-body" style="padding:0 4px;"></div>
    <div class="sheet-footer">
      <button class="btn secondary" onclick="reviewPlan('rejected')">Reject</button>
      <button class="btn btn-primary" onclick="reviewPlan('approved')">Approve</button>
    </div>
  </div>

  <!-- Check-out sheet (type-aware) -->
  <div class="sheet-backdrop" id="checkout-backdrop" onclick="closeSheet('checkout')"></div>
  <div class="bottom-sheet" id="checkout-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">Check out</span>
      <button class="sheet-close" onclick="closeSheet('checkout')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="co-doctor-block">
      <div class="co-doctor-name" id="co-acc-name">Account</div>
      <div class="co-doctor-meta" id="co-acc-meta">Type · Purpose</div>
    </div>
    <div class="co-section">
      <label class="tke-label">Check-out time</label>
      <div class="co-readonly-wrap"><input class="tke-input co-readonly" id="co-time" readonly></div>
    </div>
    <div class="co-section">
      <label class="tke-label">Visit outcome <span class="req" style="color:var(--red)">*</span></label>
      <select class="tke-select" id="co-outcome">
        <option value="">Select outcome</option>
        <option>Positive</option><option>Neutral</option><option>Negative</option><option>Incomplete</option>
      </select>
    </div>
    <!-- type-specific fields injected here -->
    <div id="co-typefields"></div>
    <div class="co-section">
      <label class="tke-label">Next action</label>
      <textarea class="tke-textarea" id="co-action" maxlength="500" placeholder="What's the next step you committed to?" oninput="updateActionCounter()"></textarea>
      <span class="co-counter" id="co-counter">0 / 500</span>
    </div>
    <div class="sheet-footer">
      <button class="btn secondary" onclick="closeSheet('checkout')">Cancel</button>
      <button class="btn btn-primary" onclick="submitCheckout()">Complete visit</button>
    </div>
  </div>

  <!-- Reschedule sheet -->
  <div class="sheet-backdrop" id="update-backdrop" onclick="closeSheet('update')"></div>
  <div class="bottom-sheet" id="update-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">Reschedule visit</span>
      <button class="sheet-close" onclick="closeSheet('update')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="co-doctor-block">
      <div class="co-doctor-name" id="uv-acc-name">Account</div>
      <div class="co-doctor-meta" id="uv-acc-meta">Purpose</div>
    </div>
    <div class="co-section">
      <label class="tke-label">New visit time <span class="req" style="color:var(--red)">*</span></label>
      <input type="time" class="tke-input" id="uv-new-time" style="font-size:16px;">
    </div>
    <div class="co-section">
      <label class="tke-label">Reason for change <span class="req" style="color:var(--red)">*</span></label>
      <select class="tke-select" id="uv-reason">
        <option value="">Select a reason</option>
        <option>Contact unavailable currently</option>
        <option>Asked to reschedule today</option>
        <option>Asked to reschedule to another day</option>
      </select>
    </div>
    <div class="mc-note" style="margin:0 4px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      Rescheduling sends the modified plan to your manager for approval.
    </div>
    <div class="sheet-footer">
      <button class="btn secondary" onclick="closeSheet('update')">Cancel</button>
      <button class="btn btn-primary" onclick="submitReschedule()">Save &amp; send for approval</button>
    </div>
  </div>
</div>

<script src="/assets/data.js"></script>
<script src="/assets/shell.js"></script>
<script>
initShell('plan');

const bp={
  main:"plan",status:"All",
  overrides:{},      /* visit id -> {status, outcome, ...} */
  current:null,      /* current visit in detail */
  checkoutId:null,
  pending:JSON.parse(JSON.stringify(BEAT_PLAN_STATE.pending)),
  today:JSON.parse(JSON.stringify(BEAT_PLAN_STATE.today)),
};

const PLAN_TABS=[
  {k:"All",m:v=>true},
  {k:"Upcoming",m:v=>v.status==='up'},
  {k:"Active",m:v=>v.status==='active'||v.status==='waiting'},
  {k:"Completed",m:v=>v.status==='done'},
  {k:"Missed",m:v=>v.status==='miss'},
];

function typeClass(t){return t==='referral'?'up':t==='venue'?'wait':'done';}
function getAddedVisits(){ try{ return JSON.parse(sessionStorage.getItem('addedVisits')||'[]'); }catch(e){ return []; } }
/* Approved, not-yet-run activities show in the plan as camp visits */
function activityVisits(){
  if(typeof ACTIVITIES==='undefined') return [];
  return ACTIVITIES.filter(a=>a.approval==='approved'&&a.exec==='planned').map(a=>({
    id:'ACT-'+a.id,time:a.time&&a.time!=='TBD'?a.time.split(' ')[0]:'TBD',ap:a.time&&/PM/.test(a.time)?'':'',
    accountSlug:a.venueSlug,accountName:a.venueName,accountSub:'Camp / event',type:'venue',
    purpose:a.name,contact:'Camp team',vt:'In person',status:'up',fromActivity:true
  }));
}
function rawVisits(){ return PLAN_VISITS.concat(getAddedVisits(),activityVisits()); }
function mergedVisit(v){const o=bp.overrides[v.id];return o?{...v,...o}:v;}
function allVisits(){return rawVisits().map(mergedVisit);}
function findVisitById(id){return rawVisits().find(v=>v.id===id);}

/* ── Maker-checker banner ── */
function renderMCBanner(){
  const el=document.getElementById('mc-banner');
  /* Queued "Add Visit" additions put the plan into a pending-approval state
     until a manager approves (then they stay, as an approved edit). */
  const added=getAddedVisits();
  const addedApproved=sessionStorage.getItem('addedVisitsApproved')==='1';
  if(added.length && !addedApproved && (!bp.pending || bp.pending.status!=='pending')){
    bp.pending={date:"Today (edited)",source:"manual",status:"pending",submittedBy:"Raj Hussain",submittedAt:"just now",note:`${added.length} visit${added.length!==1?'s':''} added: ${added.map(a=>a.accountName).join(', ')}`,visitCount:PLAN_VISITS.length+added.length};
  }
  const tmeta=PLAN_STATUS_META[bp.today.status];
  let html=`<div class="mc-today">
    <span class="mc-today-l">Today's plan</span>
    <span class="pill ${tmeta.cls}">${tmeta.label}</span>
    <span class="mc-today-src">${bp.today.source==='auto'?'Auto-generated':'Manual'}</span>
  </div>`;
  if(bp.pending && bp.pending.status==='pending'){
    html+=`<div class="mc-pending" onclick="openApproval()">
      <span class="mc-pending-ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
      <span class="mc-pending-body">
        <span class="mc-pending-t">${bp.pending.date} · pending approval</span>
        <span class="mc-pending-s">${bp.pending.note}</span>
      </span>
      <span class="pill wait">Review</span>
    </div>`;
  } else if(bp.pending && bp.pending.status==='approved'){
    html+=`<div class="mc-note"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12l5 5L20 7"/></svg> ${bp.pending.date} plan approved.</div>`;
  } else if(bp.pending && bp.pending.status==='rejected'){
    html+=`<div class="mc-note rej"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 6l12 12M18 6L6 18"/></svg> ${bp.pending.date} plan rejected — revise and resubmit.</div>`;
  }
  el.innerHTML=html;
}

function openApproval(){
  const p=bp.pending;
  document.getElementById('approval-sub').textContent=`${p.date} · submitted by ${p.submittedBy}`;
  document.getElementById('approval-body').innerHTML=`
    <div class="vd-row"><span class="vd-row-label">Source</span><span class="vd-row-value">${p.source==='auto'?'Auto-generated':'Manually built'}</span></div>
    <div class="vd-row"><span class="vd-row-label">Visits</span><span class="vd-row-value">${p.visitCount} planned</span></div>
    <div class="vd-row"><span class="vd-row-label">Submitted</span><span class="vd-row-value">${p.submittedAt}</span></div>
    <div class="vd-row" style="align-items:flex-start;"><span class="vd-row-label">Change note</span><span class="vd-row-value" style="text-align:right;">${p.note}</span></div>`;
  openSheet('approval');
}
function reviewPlan(decision){
  bp.pending.status=decision;
  /* approving keeps queued additions in the plan; rejecting drops them */
  if(decision==='approved'){ sessionStorage.setItem('addedVisitsApproved','1'); }
  else { sessionStorage.removeItem('addedVisits'); sessionStorage.removeItem('addedVisitsApproved'); }
  closeSheet('approval');
  renderMCBanner();
  renderPlan();
  snack(decision==='approved'?'Plan approved.':'Plan rejected — rep notified.');
}
function createPlan(source){
  closeSheet('newplan');
  bp.pending={date:"Wed, 17 Jun 2026",source,status:"pending",submittedBy:"Raj Hussain",submittedAt:"now",note:source==='auto'?"Auto-generated plan for 17 Jun":"Manually built plan for 17 Jun",visitCount:6};
  renderMCBanner();
  snack(source==='auto'?'Auto plan created — sent for approval.':'Plan created — sent for approval.');
}

/* ── Plan / History toggle ── */
function setMainView(v){
  bp.main=v;
  document.getElementById('vt-plan').classList.toggle('sel',v==='plan');
  document.getElementById('vt-hist').classList.toggle('sel',v==='hist');
  document.getElementById('plan-list').style.display=v==='plan'?'':'none';
  document.getElementById('hist-list').style.display=v==='hist'?'':'none';
  document.getElementById('plan-statusbar').style.display=v==='plan'?'':'none';
  document.querySelector('#view-list .toolsrow').style.display=v==='plan'?'':'none';
  if(v==='hist') renderHistory(); else renderPlan();
}
function setPlanStatus(k){bp.status=k;renderPlan();}

/* ── Plan list ── */
function renderPlan(){
  const all=allVisits();
  const counts={};PLAN_TABS.forEach(t=>counts[t.k]=all.filter(t.m).length);
  document.getElementById('plan-statusbar').innerHTML=PLAN_TABS.map(t=>`
    <button class="plan-stat-chip ${bp.status===t.k?'sel':''}" onclick="setPlanStatus('${t.k}')">${t.k}<span class="ct">${counts[t.k]}</span></button>`).join('');
  const tab=PLAN_TABS.find(t=>t.k===bp.status);
  const visits=all.filter(tab.m);
  document.getElementById('plan-count').textContent=`${visits.length} visit${visits.length!==1?'s':''} · Today`;
  const list=document.getElementById('plan-list');
  if(!visits.length){list.innerHTML='<div class="empty"><div class="et">No visits match</div><div class="ed">Adjust the status filter to see what else is here.</div></div>';return;}
  list.innerHTML=visits.map(visitCardHTML).join('');
}

function visitCardHTML(v){
  const meta=ACCOUNT_TYPE_META[v.type];
  const isUp=v.status==='up',isActive=v.status==='active',isWaiting=v.status==='waiting',isDone=v.status==='done',isMiss=v.status==='miss';
  const vtIcon=v.vt==='Video call'?SVG.video:SVG.person;
  let statusBadge;
  if(isActive||isWaiting) statusBadge=`<span class="vc-wait-badge"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>${v.waitMins||0}m wait</span>`;
  else statusBadge=`<span class="pill ${STATUS_CLASS[v.status]}">${STATUS_LABEL[v.status]}</span>`;
  let actions='';
  if(isUp||isActive) actions+=`<button class="vc-cta checkin" onclick="event.stopPropagation();event.preventDefault();doCheckIn('${v.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>Check in</button>`;
  if(isWaiting) actions+=`<button class="vc-cta checkout" onclick="event.stopPropagation();event.preventDefault();openCheckout('${v.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>Check out</button>`;
  if(isDone&&v.outcome) actions+=`<span class="vc-outcome ${outcomeClass(v.outcome)}"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>${v.outcome}</span>`;
  const durSpan=isDone&&v.dur?`<span class="vc-dur">· ${v.dur}</span>`:'';
  const tierBadge=v.type==='referral'&&v.tier?`<span class="badge tier${v.tier}" style="margin-left:6px;">P${v.tier}</span>`:'';
  return `<a class="vc ${isWaiting||isActive?'is-waiting':''}" href="/beat-plan/${v.id}" onclick="event.preventDefault();bucketGo('/beat-plan/${v.id}');">
    <div class="vc-top">
      <span class="vc-time-wrap"><span class="vc-time">${v.time}</span><span class="vc-ap">${v.ap}</span>${durSpan}</span>
      <span>${statusBadge}</span>
    </div>
    <div class="vc-body">
      <div class="vc-name">${v.accountName}${tierBadge}${v.added?'<span class="vc-resched-tag" style="background:var(--teal-tint);color:var(--teal-deep);"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>Added</span>':''}</div>
      <div class="vc-sub"><span class="sp">${meta.chip} · ${v.purpose}</span></div>
      <div class="vc-sub"><span class="cl">${v.contact}</span></div>
    </div>
    <div class="vc-foot">
      <span class="vc-vtype">${vtIcon} ${v.vt}</span>
      <span class="vc-foot-actions"><span class="pill ${typeClass(v.type)}" style="margin-right:2px;">${meta.chip}</span>${actions}</span>
    </div>
  </a>`;
}

/* ── History ── */
function renderHistory(){
  const list=document.getElementById('hist-list');
  list.innerHTML=`<div class="plan-count" style="margin:2px 0 8px;">${VISIT_HISTORY.length} completed visits</div>`+
    VISIT_HISTORY.map(h=>{
      const meta=ACCOUNT_TYPE_META[h.type];
      const cls=outcomeClass(h.outcome);
      return `<a class="vc" href="/accounts/${h.accountSlug}" onclick="event.preventDefault();bucketGo('/accounts/${h.accountSlug}');">
        <div class="vc-top">
          <span class="vc-time-wrap"><span class="vc-time" style="font-size:13px;">${h.date}</span><span class="vc-ap">${h.time}</span></span>
          <span class="tl-pill ${cls}">${h.outcome}</span>
        </div>
        <div class="vc-body">
          <div class="vc-name">${h.accountName}</div>
          <div class="vc-sub"><span class="sp">${meta.chip} · ${h.purpose}</span></div>
          <div class="vc-sub"><span class="cl">${h.detail}</span></div>
        </div>
        <div class="vc-foot"><span class="vc-vtype">${h.contact}</span></div>
      </a>`;
    }).join('');
}

/* ── Check-in / out ── */
function nowTimeStr(){const d=new Date();let h=d.getHours(),m=d.getMinutes();const ap=h>=12?'PM':'AM';h=h%12||12;return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ap}`;}
function doCheckIn(id){
  bp.overrides[id]={...(bp.overrides[id]||{}),status:'waiting',checkedInAt:nowTimeStr(),waitMins:0};
  snack(`Checked in at ${nowTimeStr()}`);
  if(bp.current&&bp.current.id===id) renderDetail(id); else renderPlan();
}

/* Type-aware check-out field configs */
const CO_FIELDS={
  referral:[
    {k:"commitment",label:"Referral commitment",type:"select",opts:["Written","Verbal","None yet"]},
    {k:"specialties",label:"Specialties discussed",type:"chips",opts:["Cardiology","Ortho","Oncology","Neuro","General Med","Pediatrics"]},
    {k:"expected",label:"Expected referrals / month",type:"chips",opts:["1–2","3–5","6+","None"]},
    {k:"cadence",label:"Recommended next visit",type:"select",opts:["Within 1 week","Within 2 weeks","Within a month","No follow-up"]},
  ],
  venue:[
    {k:"confirmed",label:"Venue confirmed for camp?",type:"chips",opts:["Yes","Tentative","No"]},
    {k:"campdate",label:"Proposed camp date",type:"date"},
    {k:"footfall",label:"Expected footfall",type:"chips",opts:["<100","100–250","250–500","500+"]},
    {k:"services",label:"Services to offer",type:"chips",opts:["BP","Sugar","BMI","ECG","Specialist OPD"]},
    {k:"logistics",label:"Logistics agreed",type:"chips",opts:["Space","Tables","Power","Permissions"]},
  ],
  corporate:[
    {k:"dm",label:"Decision-maker met?",type:"chips",opts:["Yes","No"]},
    {k:"package",label:"Package discussed",type:"select",opts:["OPD only","IPD only","OPD + IPD","Custom"]},
    {k:"moustage",label:"MOU stage",type:"select",opts:["Intro","Proposal","Negotiation","Legal review","Signed"]},
    {k:"employees",label:"Employees covered",type:"chips",opts:["<1k","1k–5k","5k–20k","20k+"]},
  ],
};
let coState={};

function openCheckout(id){
  const v=mergedVisit(findVisitById(id)); if(!v) return;
  bp.checkoutId=id; coState={};
  const meta=ACCOUNT_TYPE_META[v.type];
  document.getElementById('co-acc-name').textContent=v.accountName;
  document.getElementById('co-acc-meta').textContent=`${meta.label} · ${v.purpose}`;
  document.getElementById('co-time').value=nowTimeStr();
  document.getElementById('co-outcome').value='';
  document.getElementById('co-action').value='';
  updateActionCounter();
  renderCheckoutFields(v.type);
  openSheet('checkout');
}
function renderCheckoutFields(type){
  const wrap=document.getElementById('co-typefields');
  wrap.innerHTML=(CO_FIELDS[type]||[]).map(f=>{
    if(f.type==='select'){
      return `<div class="co-section"><label class="tke-label">${f.label}</label>
        <select class="tke-select" onchange="coState['${f.k}']=this.value">
          <option value="">Select</option>${f.opts.map(o=>`<option>${o}</option>`).join('')}
        </select></div>`;
    }
    if(f.type==='date'){
      return `<div class="co-section"><label class="tke-label">${f.label}</label>
        <input type="date" class="tke-input" style="font-size:16px;" onchange="coState['${f.k}']=this.value"></div>`;
    }
    /* chips (multi-select set) */
    return `<div class="co-section"><label class="tke-label">${f.label}</label>
      <div class="sf-chips">${f.opts.map(o=>`<button class="sf-chip-multi" onclick="toggleCoChip('${f.k}','${o.replace(/'/g,"\\'")}',this)">${o}</button>`).join('')}</div></div>`;
  }).join('');
}
function toggleCoChip(k,val,btn){
  coState[k]=coState[k]||[];
  const i=coState[k].indexOf(val);
  if(i>=0) coState[k].splice(i,1); else coState[k].push(val);
  btn.classList.toggle('sel');
}
function updateActionCounter(){const t=document.getElementById('co-action');document.getElementById('co-counter').textContent=`${t.value.length} / 500`;}
function submitCheckout(){
  const outcome=document.getElementById('co-outcome').value;
  if(!outcome){snack('Please select a visit outcome.');return;}
  const id=bp.checkoutId;
  const dur=`${8+Math.floor((id.length*13)%18)} min`;
  bp.overrides[id]={...(bp.overrides[id]||{}),status:'done',outcome,dur};
  closeSheet('checkout');
  snack(`Visit completed · ${outcome}`);
  if(bp.current&&bp.current.id===id) renderDetail(id); else renderPlan();
}

function submitReschedule(){
  const t=document.getElementById('uv-new-time').value;
  const r=document.getElementById('uv-reason').value;
  if(!t||!r){snack('Enter a new time and reason.');return;}
  closeSheet('update');
  bp.pending={date:"Today (edited)",source:"manual",status:"pending",submittedBy:"Raj Hussain",submittedAt:"now",note:`Rescheduled ${bp.current?bp.current.accountName:'a visit'} — ${r}`,visitCount:PLAN_VISITS.length};
  snack('Reschedule sent for approval.');
}

function outcomeClass(o){return o==='Positive'?'pos':o==='Negative'?'neg':o==='Neutral'?'neu':'neu';}

/* ── Detail ── */
function vRow(label,val){return `<div class="vd-row"><span class="vd-row-label">${label}</span><span class="vd-row-value">${val||'—'}</span></div>`;}
function renderDetail(id){
  const v=mergedVisit(findVisitById(id));
  const content=document.getElementById('vd-content');
  const footer=document.getElementById('vd-footer');
  if(!v){
    document.getElementById('vd-hero-name').textContent='Visit not found';
    document.getElementById('vd-hero-purpose').textContent='';
    document.getElementById('vd-hero-account').textContent='';
    document.getElementById('vd-hero-type').style.display='none';
    content.innerHTML='<div class="empty" style="margin-top:24px;"><div class="et">Visit not found</div></div>';
    footer.style.display='none';
    return;
  }
  bp.current=v;
  const meta=ACCOUNT_TYPE_META[v.type];
  document.getElementById('vd-hero-type').style.display='';
  document.getElementById('vd-hero-avatar').textContent=accInitials(v.accountName);
  document.getElementById('vd-hero-name').textContent=v.accountName;
  document.getElementById('vd-hero-purpose').textContent=`${meta.chip} · ${v.purpose}`;
  document.getElementById('vd-hero-type').textContent=meta.chip;
  document.getElementById('vd-hero-type').className=`pill ${typeClass(v.type)}`;
  document.getElementById('vd-hero-account').textContent=v.accountSub;
  document.getElementById('vd-visit-id').textContent=`${v.time} ${v.ap}`;
  document.getElementById('vd-follow-up').textContent=STATUS_LABEL[v.status];

  let rows=vRow('Time',`${v.time} ${v.ap}`)+vRow('Visit type',v.vt)+vRow('Purpose',v.purpose)+vRow('Contact',v.contact);
  if(v.type==='referral'&&v.tier) rows+=vRow('Account tier',`P${v.tier}`);
  if(v.status==='done'&&v.outcome) rows+=vRow('Outcome',v.outcome);
  content.innerHTML=`<div class="acc open"><div class="acc-head">
      <div class="acc-icon">${meta.icon}</div>
      <div class="acc-title"><div class="acc-name">Visit details</div><div class="acc-sub">${meta.label}</div></div>
    </div><div class="acc-body">${rows}</div></div>`;

  /* footer CTA by status */
  footer.style.display='';
  const cta=document.getElementById('vd-footer-cta');
  if(v.status==='up'||v.status==='active'){ cta.textContent='Check in'; cta.onclick=()=>doCheckIn(v.id); cta.disabled=false; cta.style.opacity='1'; }
  else if(v.status==='waiting'){ cta.textContent='Check out'; cta.onclick=()=>openCheckout(v.id); cta.disabled=false; cta.style.opacity='1'; }
  else if(v.status==='done'){ cta.textContent='Visit completed'; cta.onclick=null; cta.disabled=true; cta.style.opacity='.55'; }
  else { cta.textContent='Reschedule'; cta.onclick=()=>openSheet('update'); cta.disabled=false; cta.style.opacity='1'; }

  /* prime reschedule sheet */
  document.getElementById('uv-acc-name').textContent=v.accountName;
  document.getElementById('uv-acc-meta').textContent=`${meta.chip} · ${v.purpose}`;
  document.querySelector('#view-detail .screen').scrollTop=0;
}
function openAccount(){ if(bp.current) bucketGo('/accounts/'+bp.current.accountSlug); }

function showView(name){
  document.getElementById('view-list').classList.toggle('active',name==='list');
  document.getElementById('view-detail').classList.toggle('active',name==='detail');
}

bucketRoute('/beat-plan',{
  list(){ showView('list'); renderMCBanner(); setMainView(bp.main); },
  detail(id){ showView('detail'); renderDetail(id); },
});
</script>
</body>
</html>
