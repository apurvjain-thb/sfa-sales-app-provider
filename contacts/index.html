<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Contacts · Sakra Sales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
<div class="device" id="device">
  <div class="stage">

    <!-- LIST -->
    <div class="screen-view" id="view-list">
      <div class="appheader">
        <div class="header-row">
          <h1 class="page-title">Contacts</h1>
          <div class="avatar" onclick="location.href='/profile'">RH</div>
        </div>
      </div>
      <div class="chiprow" id="contact-chips"></div>
      <div class="searchwrap"><div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="contact-search" placeholder="Search by name, role, account" oninput="renderContacts()">
      </div></div>
      <div class="toolsrow">
        <span class="count" id="contact-count">— contacts</span>
      </div>
      <div class="screen"><div class="pad" id="contact-list" style="padding-top:0;"></div></div>
    </div>

    <!-- DETAIL -->
    <div class="screen-view" id="view-detail">
      <div class="vd-topbar">
        <a class="vd-back" href="/contacts" onclick="event.preventDefault();bucketGo('/contacts');">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </a>
        <div class="vd-topbar-title">
          <div class="vd-visit-id">Contact</div>
          <div class="vd-follow-up" id="cd-sub"></div>
        </div>
        <button class="vd-topbar-action" onclick="snack('More actions — built next.')"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></button>
      </div>
      <div class="screen"><div style="padding:0 0 32px;">
        <div class="vd-hero-wrap">
          <div class="vd-hero">
            <div class="vd-hero-avatar" id="cd-avatar">DR</div>
            <div class="vd-hero-body">
              <div class="vd-hero-top">
                <div style="min-width:0;flex:1;">
                  <div class="vd-hero-name" id="cd-name">Contact</div>
                  <div class="vd-hero-spec" id="cd-role">Role</div>
                </div>
                <span class="pill up" id="cd-type" style="margin-top:2px;">Type</span>
              </div>
              <div class="vd-hero-clinic">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 8h2M13 8h2M9 12h2M13 12h2M9 16h6"/></svg>
                <span class="ct" id="cd-account"></span>
              </div>
              <div class="vd-hero-actions">
                <a class="vd-hero-action" id="cd-call-btn" href="#" onclick="onCallContact(event)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                  Call
                </a>
                <button class="vd-hero-action" onclick="openContactMsgSheet()">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                  Message
                </button>
              </div>
            </div>
          </div>
        </div>
        <div style="padding:0 18px 32px;" id="cd-content"></div>
      </div></div>
    </div>

  </div>

  <!-- Message templates sheet -->
  <div class="sheet-backdrop" id="cmsg-backdrop" onclick="closeSheet('cmsg')"></div>
  <div class="bottom-sheet" id="cmsg-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div>
        <span class="sheet-title">Send a message</span>
        <div class="msg-doctor-line" id="cmsg-doc-name">Contact</div>
      </div>
      <button class="sheet-close" onclick="closeSheet('cmsg')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="msg-channels" id="cmsg-channels"></div>
    <div class="msg-tmpl-list" id="cmsg-tmpl-list"></div>
    <div class="sheet-footer">
      <button class="btn secondary" onclick="closeSheet('cmsg')">Cancel</button>
      <button class="btn btn-primary" id="cmsg-send" onclick="sendContactMessage()" disabled style="opacity:.55;">Send</button>
    </div>
  </div>

  <!-- Call mode picker -->
  <div class="sheet-backdrop" id="callmode-backdrop" onclick="closeSheet('callmode')"></div>
  <div class="bottom-sheet" id="callmode-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div>
        <span class="sheet-title">How would you like to call?</span>
        <div class="msg-doctor-line" id="callmode-doc-name">Contact</div>
      </div>
      <button class="sheet-close" onclick="closeSheet('callmode')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="co-mode-grid">
      <button class="co-mode-card" onclick="placeContactCall('personal')">
        <span class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
        <div class="co-mode-card-body">
          <div class="co-mode-card-t">Call via personal number</div>
          <div class="co-mode-card-s" id="callmode-personal-sub">Direct dial to the contact's mobile.</div>
        </div>
        <svg class="co-mode-card-go" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 6l6 6-6 6"/></svg>
      </button>
      <button class="co-mode-card ai" onclick="placeContactCall('central')">
        <span class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M8 16h3M14 16h2"/></svg></span>
        <div class="co-mode-card-body">
          <div class="co-mode-card-t">Call via central line <span class="co-mode-card-tag">Recorded</span></div>
          <div class="co-mode-card-s">Routes through the Sakra telephony bridge. Number stays private.</div>
        </div>
        <svg class="co-mode-card-go" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="/assets/data.js"></script>
<script src="/assets/shell.js"></script>
<script>
initShell('contacts');

const cs={type:"All"};

function renderChips(){
  const chips=[["All","All"],["referral","Referral"],["venue","Venue"],["corporate","Corporate"]];
  document.getElementById('contact-chips').innerHTML=chips.map(([k,l])=>`<button class="chip ${cs.type===k?'active':''}" onclick="setType('${k}')">${l}</button>`).join('');
}
function setType(t){cs.type=t;renderChips();renderContacts();}

function typeClass(t){return t==='referral'?'up':t==='venue'?'wait':'done';}

function renderContacts(){
  const q=(document.getElementById('contact-search').value||'').toLowerCase();
  let rows=CONTACTS.filter(c=>{
    const typeOk=cs.type==='All'||c.type===cs.type;
    const qOk=!q||c.n.toLowerCase().includes(q)||c.role.toLowerCase().includes(q)||c.accountName.toLowerCase().includes(q)||(c.spec||'').toLowerCase().includes(q);
    return typeOk&&qOk;
  });
  document.getElementById('contact-count').textContent=`${rows.length} contact${rows.length!==1?'s':''}`;
  const list=document.getElementById('contact-list');
  if(!rows.length){list.innerHTML='<div class="empty"><div class="et">No contacts found</div><div class="ed">Try a different name, role, or account.</div></div>';return;}
  list.innerHTML=rows.map(c=>{
    const slug=slugify(c.n);
    const meta=ACCOUNT_TYPE_META[c.type];
    const line2=c.spec?`${c.role} · ${c.spec}`:c.role;
    return `<div class="card" onclick="bucketGo('/contacts/${slug}')">
      <div class="card-top">
        <span class="card-title">${c.n}</span>
        <div class="card-top-right"><span class="pill ${typeClass(c.type)}">${meta.chip}</span></div>
      </div>
      <div class="inner"><div class="line">${line2}</div><div class="line sub">${c.phone}</div></div>
      <div class="card-foot"><span class="foot-meta"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 8h2M13 8h2M9 12h2M13 12h2M9 16h6"/></svg>${c.accountName}</span></div>
    </div>`;
  }).join('');
}

function vRow(label,val){return `<div class="vd-row"><span class="vd-row-label">${label}</span><span class="vd-row-value">${val||'—'}</span></div>`;}

const cd={current:null,acc:{info:true}};

function renderDetail(slug){
  const c=findContactBySlug(slug);
  const content=document.getElementById('cd-content');
  if(!c){
    document.getElementById('cd-name').textContent='Contact not found';
    document.getElementById('cd-role').textContent='';
    document.getElementById('cd-account').textContent='';
    document.getElementById('cd-type').style.display='none';
    document.getElementById('cd-avatar').textContent='?';
    content.innerHTML='<div class="empty" style="margin-top:24px;"><div class="et">Contact not found</div><div class="ed">This link doesn\'t match any contact.</div></div>';
    return;
  }
  const meta=ACCOUNT_TYPE_META[c.type];
  document.getElementById('cd-type').style.display='';
  document.getElementById('cd-avatar').textContent=accInitials(c.n);
  document.getElementById('cd-name').textContent=c.n;
  document.getElementById('cd-role').textContent=c.spec?`${c.role} · ${c.spec}`:c.role;
  document.getElementById('cd-type').textContent=meta.chip;
  document.getElementById('cd-type').className=`pill ${typeClass(c.type)}`;
  document.getElementById('cd-account').textContent=c.accountName;
  document.getElementById('cd-sub').textContent=c.role;
  cd.current=c; cd.acc={info:true};

  content.innerHTML=renderInfo(c)+renderAccountLink(c);
  bindAccordions();
  document.querySelector('#view-detail .screen').scrollTop=0;
}

function renderInfo(c){
  let rows=vRow('Role',c.role);
  if(c.isDoctor&&c.spec) rows+=vRow('Specialty',c.spec);
  rows+=vRow('Mobile',c.phone)+vRow('Email',c.email);
  return `<div class="acc ${cd.acc.info?'open':''}" data-key="info">
    <div class="acc-head">
      <div class="acc-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="3.5"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></div>
      <div class="acc-title"><div class="acc-name">Contact details</div><div class="acc-sub">Identity & how to reach</div></div>
      <svg class="acc-chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="acc-body">${rows}</div>
  </div>`;
}

function renderAccountLink(c){
  const meta=ACCOUNT_TYPE_META[c.type];
  return `<div class="card" style="margin-top:14px;" onclick="bucketGo('/accounts/${c.accountSlug}')">
    <div class="card-top">
      <span class="card-title" style="font-size:var(--f-sub);">${c.accountName}</span>
      <span class="pill ${typeClass(c.type)}">${meta.chip}</span>
    </div>
    <div class="inner"><div class="line sub">${c.accountSub} · View account ›</div></div>
  </div>`;
}

function bindAccordions(){
  document.querySelectorAll('#cd-content .acc').forEach(acc=>{
    acc.querySelector('.acc-head').addEventListener('click',()=>{
      const k=acc.dataset.key;
      cd.acc[k]=!cd.acc[k];
      acc.classList.toggle('open',cd.acc[k]);
    });
  });
}

function showView(name){
  document.getElementById('view-list').classList.toggle('active',name==='list');
  document.getElementById('view-detail').classList.toggle('active',name==='detail');
}

/* ── Call + Message ── */
function fmtCMsgBytes(b){if(b<1024) return b+' B'; if(b<1024*1024) return (b/1024).toFixed(0)+' KB'; return (b/(1024*1024)).toFixed(1)+' MB';}
function cAttachExtBadge(name){const ext=(name.split('.').pop()||'').toLowerCase();return ({pdf:'PDF',xlsx:'XLS',xls:'XLS',png:'IMG',jpg:'IMG',jpeg:'IMG',ics:'CAL'})[ext]||'FILE';}
const C_MSG_CHANNELS=[
  {k:"SMS",   ic:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>'},
  {k:"WhatsApp",ic:'<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.94 9.94 0 0 0 4.79 1.22h.01c5.46 0 9.91-4.45 9.91-9.91S17.5 2 12.04 2zm4.52 12.99c-.25-.12-1.47-.72-1.7-.81-.23-.08-.4-.12-.56.12s-.65.81-.79.97c-.15.17-.29.18-.54.06-.25-.12-1.05-.39-1.99-1.23-.74-.66-1.23-1.47-1.38-1.72-.14-.25-.02-.38.11-.5.11-.11.25-.29.37-.43.12-.14.16-.25.25-.41.08-.17.04-.31-.02-.43-.06-.12-.55-1.33-.76-1.83-.2-.48-.4-.42-.55-.42l-.47-.01a.9.9 0 0 0-.66.31c-.23.25-.86.84-.86 2.05s.88 2.38 1 2.55c.12.17 1.73 2.64 4.19 3.7.59.25 1.05.4 1.4.52.59.19 1.12.16 1.55.1.47-.07 1.47-.6 1.67-1.18.21-.58.21-1.07.14-1.18-.06-.11-.22-.18-.47-.3z"/></svg>'},
  {k:"Email", ic:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>'},
];
const CENTRAL_LINE='+91 80 4567 8900';

function onCallContact(e){
  e.preventDefault();
  const c=cd.current; if(!c){snack('No contact loaded.');return;}
  document.getElementById('callmode-doc-name').textContent=`${c.n} · ${c.accountName}`;
  document.getElementById('callmode-personal-sub').textContent=c.phone?`Direct dial · ${c.phone}`:'No personal number on file.';
  openSheet('callmode');
}
function placeContactCall(mode){
  const c=cd.current; if(!c){ closeSheet('callmode'); return; }
  closeSheet('callmode');
  if(mode==='personal'){
    if(!c.phone){ snack('No personal number on file.'); return; }
    location.href=`tel:${c.phone.replace(/\s/g,'')}`;
    snack(`Dialling ${c.n} on personal number…`);
  } else {
    const ext=`ext ${4000+Math.floor((slugify(c.n).length*97)%900)}`;
    location.href=`tel:${CENTRAL_LINE.replace(/\s|\+/g,'')}`;
    snack(`Connecting via central line · ${ext}`);
  }
}

let cmsgState={channel:"WhatsApp",previewIdx:null};
function shortName(c){return c.n.replace(/^(Dr|Mr|Mrs|Ms)\.?\s*/i,'').split(/\s+/)[0];}
function templatesFor(c){return (PROVIDER_MSG_TEMPLATES[c.type]||{})[cmsgState.channel]||[];}

function openContactMsgSheet(){
  const c=cd.current; if(!c) return;
  document.getElementById('cmsg-doc-name').textContent=`${c.n} · ${c.accountName}`;
  cmsgState={channel:"WhatsApp",previewIdx:null};
  renderCMsgList();
  openSheet('cmsg');
}
function renderCMsgList(){
  document.getElementById('cmsg-channels').style.display='';
  document.getElementById('cmsg-channels').innerHTML=C_MSG_CHANNELS.map(ch=>`
    <button class="msg-channel-chip ${cmsgState.channel===ch.k?'sel':''}" onclick="pickCMsgChannel('${ch.k}')">${ch.ic}${ch.k}</button>`).join('');
  const c=cd.current; if(!c) return;
  const name=shortName(c);
  const list=templatesFor(c);
  const wrap=document.getElementById('cmsg-tmpl-list');
  if(!list.length){ wrap.innerHTML='<div class="empty" style="padding:18px 0;"><div class="ed">No templates for this channel yet.</div></div>'; }
  else wrap.innerHTML=list.map((t,i)=>{
    const att=(t.attachments||[]).length;
    const body=t.b.replace(/\{name\}/g,name).replace(/\n/g,'<br>');
    return `<div class="msg-tmpl" onclick="openCMsgPreview(${i})">
      <div class="msg-tmpl-h">
        <span class="msg-tmpl-t">${t.t}</span>
        ${att?`<span class="msg-tmpl-attach-tag"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>${att}</span>`:''}
      </div>
      <div class="msg-tmpl-body">${body}</div>
    </div>`;
  }).join('');
  const send=document.getElementById('cmsg-send');
  send.disabled=true; send.style.opacity='.55'; send.textContent='Send';
}
function pickCMsgChannel(k){ cmsgState.channel=k; cmsgState.previewIdx=null; renderCMsgList(); }

function openCMsgPreview(i){
  cmsgState.previewIdx=i;
  const c=cd.current; const tmpl=templatesFor(c)[i];
  const name=shortName(c);
  const body=tmpl.b.replace(/\{name\}/g,name);
  const attList=(tmpl.attachments||[]).map(a=>`
    <div class="attach-chip">
      <span class="attach-chip-ic">${cAttachExtBadge(a.name)}</span>
      <div class="attach-chip-info">
        <div class="attach-chip-name">${a.name}</div>
        <div class="attach-chip-size">${fmtCMsgBytes(a.size)}</div>
      </div>
    </div>`).join('');
  document.getElementById('cmsg-channels').style.display='none';
  document.getElementById('cmsg-tmpl-list').innerHTML=`
    <button class="msg-preview-back" onclick="cmsgState.previewIdx=null;renderCMsgList();">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to templates
    </button>
    <span class="msg-preview-channel">${cmsgState.channel} template</span>
    <div class="msg-preview-title">${tmpl.t}</div>
    <div class="msg-preview-body">${body.replace(/\n/g,'<br>')}</div>
    ${attList?`<div class="msg-preview-attach-h">Attachments · ${(tmpl.attachments||[]).length}</div><div class="msg-preview-attach-list">${attList}</div>`:''}`;
  const send=document.getElementById('cmsg-send');
  send.disabled=false; send.style.opacity='1';
  send.textContent=`Send via ${cmsgState.channel}`;
}

function sendContactMessage(){
  if(cmsgState.previewIdx==null) return;
  const tmpl=templatesFor(cd.current)[cmsgState.previewIdx];
  closeSheet('cmsg');
  snack(`${cmsgState.channel} template "${tmpl.t}" sent.`);
}

bucketRoute('/contacts',{
  list(){ showView('list'); renderChips(); renderContacts(); },
  detail(slug){ showView('detail'); renderDetail(slug); },
});
</script>
</body>
</html>
